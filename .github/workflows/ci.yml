name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync and lint
        run: |
          uv sync --frozen --all-groups
          uv run ruff check agents bridge
          uv run ruff format --check agents bridge

      - name: Tests
        run: uv run pytest -q

  node-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run doctor

  go-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -o /tmp/career-dashboard-test .
        working-directory: dashboard
